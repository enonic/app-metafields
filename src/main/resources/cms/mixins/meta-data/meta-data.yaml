kind: "Mixin"
title: "SEO"
form:
    -   type: "TextLine"
        name: "seoTitle"
        label: "Override title"
        helpText: "Normally we use each content's displayName to generate the title tag,\
      \ but if you want you can override it here on a per content basis."
        occurrences:
            min: 0
            max: 1
    -   type: "TextArea"
        name: "seoDescription"
        label: "Override description"
        helpText: "Like with titles you can for each content set a custom description\
      \ used for SEO. We try to extract this data automatically from suitable existing\
      \ fields on this content, consult the Github readme for details."
        occurrences:
            min: 0
            max: 1
        showCounter: true
    -   type: "ImageSelector"
        name: "seoImage"
        label: "Override image"
        helpText: "Customize the image used for this content when shared on social media\
      \ (Facebook, Twitter). Leave empty to let the app automatically find an image\
      \ for you."
        occurrences:
            min: 0
            max: 1
    -   type: "ContentSelector"
        name: "seoContentForCanonicalUrl"
        label: "Canonical"
        helpText: "Select the canonical content you want search engines to index, instead\
      \ of this."
        occurrences:
            min: 0
            max: 1
        attributes:
            relationshipType: "system:reference"
        allowPath:
            - "${site}/*"
    -   type: "CheckBox"
        name: "blockRobots"
        label: "Hide from external search engines?"
        helpText: "Checking this will tell external search engines to skip this particular\
      \ page. Note: The page is not hidden and can still be accessed via URL or links,\
      \ but search engines will try and not list it in their search results."
        occurrences:
            min: 0
            max: 1
